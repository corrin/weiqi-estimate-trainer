# KataGo analysis-engine config tuned for BULK throughput (phase3/phase4 preprocessing).
# Unlike KaTrain's interactive config (12 analysis threads x 8 search threads),
# bulk work wants many positions in parallel with few threads per search tree:
# parallelism across positions is more GPU-efficient and does not weaken each search.

reportAnalysisWinratesAs = BLACK
conservativePass = true

# Default visit cap if a query does not specify maxVisits (our queries always do).
maxVisits = 1000

# Many positions analyzed concurrently, minimal per-position parallelism.
numAnalysisThreads = 32
numSearchThreads = 2

# Should be >= numAnalysisThreads * numSearchThreads for full GPU batches.
nnMaxBatchSize = 64

nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 16
nnRandomize = true
